<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function randomFood(){
            // 금액입력 객체를 가져온다
            let priceObj=window.document.getElementById("price");
            // 금액입력 1200원 미만이면 경고장을 리턴한다.
            let price = window.parseInt(priceObj.value);
            window.console.log("price",price);
            if(price < 1200){
                window.alert(`${price} 가격으로는 주문불가입니다.`);
                return;
            }
            
            // 금액입력 1200원 이상이면 음식 몇개를 살수있는지 파악한다. 금액/1200
            // 총액과 잔액 계산해서 보여준다.
            let count = Math.floor(price/1200);
            let total = count * 1200;
            let change = price - total;
            // 개수만큼 음식이미지를 보여준다.
            for(let i=0;i<count;i++){
                // 랜덤수
                let no = Math.floor(Math.random()*(3-1+1)+1);
                document.write(`${i+1}번음식: <img src="./media/food${no}.png" width="200px">` );
            }
            document.write("<hr>");
            document.write(`<p>총액: ${total} 잔액:${change}</p>`);
            window.console.log("count"+count);
        }
    </script>
</head>
<body>
    <form action="#" method="get">
        <p>음식 1개당 1200원입니다. 얼마 내실래요?</p>
        <label for="food">금액 입력</label>
        <input type="number" name="price" id="price" max="100000" min="1000">
        <button type="button" onclick="randomFood();">order</button>
        <img src="./media/food1.png" width="200px">
    </form>
</body>
</html>
