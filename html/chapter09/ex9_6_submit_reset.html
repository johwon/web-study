<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function onLoad(){
            //객체찾기
            const myform = document.myform; /*네임으로 찾기*/
            const id = document.myform.id;
            const pwd = document.myform.pwd;
            const chkID = "cho";
            const chkPWD = "1234";

            // 이벤트리스너 등록 핸들러처리
            myform.addEventListener("submit",(event)=>{
                event.preventDefault(); //원래 성질의 기능 이벤트를 막는다(서버전송막기)
                //패턴검색
                //값체크
                if(id.value !== chkID){
                    id.nextSibling.textContent = "아이디가 맞지 않습니다";
                    id.value = "";
                    id.focus();
                    return;
                }else{
                    id.nextSibling.textContent = "성공";
                }
                if(pwd.value !== chkPWD){
                    pwd.nextSibling.textContent = "비밀번호가 맞지 않습니다";
                    pwd.value = "";
                    pwd.focus();
                    return;
                }else{
                    pwd.nextSibling.textContent = "성공";
                }
                myform.submit(); //서버에 데이터를 전송하고 폼에 있는 데이터는 리셋
            })

        }
    </script>
</head>
<body onload="onLoad();">
    <form action="#" method="get" name="myform">
        <label for="id">ID입력: </label>
        <input type="text" name="id" id="id" placeholder="테스트"><span></span>
        <br>
        <label for="pwd">pwd입력: </label>
        <input type="password" name="pwd" id="pwd" placeholder="비밀번호 입력"><span></span>
        <br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
    <hr>
    <p></p>
</body>
</html>
