<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    form{
        width: 400px;
    }
    span{
        font-size: small;
    }
    .submit {
       margin-left: 100px;
    }
    
</style>
<body>
    <form action="insert.no" method="post">
        <fieldset>
            <legend>공지사항 작성하기</legend>
            <table>
                <tr>
                    <th>제목</th>
                    <td><input type="text" name="title" id="title" placeholder="제목을 입력하시오." required></td><br>
                </tr>
                <tr>
                    <th>내용</th>
                    <td><textarea name="content" id="content" cols="22" rows="10" placeholder="내용을 입력하시오." required></textarea></td><br>
                </tr>
                <tr>
                    <th>첨부파일</th>
                    <td><button type="button" name="uploadFile">파일 선택</button> <span>선택된 파일 없음</span></td>
                    <br>
                </tr>
            </table>
                <button type="submit" class="submit">작성하기</button>
            </fieldset>
        </form>
</body>
</html>
