<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        total = window.prompt("입장객은 몇명인가요?");
        col = window.prompt("한 줄에 몇 명씩 앉습니까?");
        let i, j;
        let count = 0;
        for(i=0;i<total/col;i++){
            for(j=0;j<col;j++){
                count++;
                if(count>total){
                    break;
                }
                document.write(`좌석${count}`);
            }
            document.write("<br>");
        }
    </script>
</head>
<body>
    
</body>
</html>
