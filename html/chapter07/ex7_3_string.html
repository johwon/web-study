<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        const s1 = new String("Web");
        const s2 = "  Progr  amming  ";

        document.write("s1 = "+s1+"<br>");
        document.write(`s2 = ${s2}<br> <hr>`);

        const data1 = s1.charAt(2);
        document.write(`s1.charAt(2) = ${data1}<br> <hr>`);

        const data2 = s1.concat(s2);
        document.write(`s1.concat(s2) = ${data2}<br> <hr>`);

        const index1 = s2.indexOf('i');
        document.write(`s2.indexOf('i') = ${index1}<br> <hr>`);

        const data3 = s2.replace('m','M');
        document.write(`s2.replace('m','M') = ${data3}<br> <hr>`);

        const index2 = s2.search('m');
        document.write(`s2.search('m') = ${index2}<br> <hr>`);

        const s2Array = s2.split('a');
        document.write(`s2Array.length = ${s2Array.length} <br>`);
        document.write(`s2.split('a') = ${s2Array} <br>`);
        for(let i=0;i<s2Array.length;i++){
            
            document.write(`s2Array[${i}] = ${s2Array[i]} <Br> <hr>`);
        }

        const data4 = s2.substr(0,4);
        document.write(`s2.substr(0,4) = ${data4}<br> <hr>`);

        const data5 = s2.substring(3,7);
        document.write(`s2.substring(3,7) = ${data5}<br> <hr>`);

        const data6 = s2.slice(3,7);
        document.write(`s2.slice(3,7) = ${data6}<br> <hr>`);

        const data7 = s2.trim();
        document.write(`s2.trim()) = +${data7}+<br> <hr>`);
        document.write(`s2) = +${s2}+<br> <hr>`);


    </script>
</head>
<body>
    
</body>
</html>
