<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function onLoad(){
            //객체찾기
            const close = document.querySelector("#close");
            const userid = document.querySelector("#userID");
            const pwd = document.querySelector("#pwd");
             
            //이벤트리스너, 핸들러
            close.addEventListener("click",()=>{
                //부모창 찾기
                const pWin = window.opener;
                pWin.document.querySelector("#id").value = userid.value;
                pWin.document.querySelector("#pwd").value = pwd.value;
                window.close();

            })
        }
    </script>
</head>
<body onload="onLoad();">
    <form action="login.jsp" method="post" name="login">
        <label for="userID" >사용자ID</label> <br>
        <input type="text" name="userID" id="userID"><span></span> <br>
        <label for="pwd">패스워드</label> <br>
        <input type="password" name="userpwd" id="pwd"><span></span> <br>
        <button type="button">log in</button>
    </form>
    <hr>
    <button type="button" id="close">팝업창 닫기</button>
</body>
</html>
