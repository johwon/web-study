<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>p & No class</p>
    <p class="elm">p class="elm" 1</p>
    <p class="elm">p class="elm" 2</p>
    <hr>
    <script>
        const elmArray = document.querySelectorAll(".elm");
        elmArray.forEach((elm, index)=>{
            document.write(`querySelectorAll: elm[${index}] = ${elm.textContent} <br>`);
        });

        const pArray = document.querySelectorAll("p");
        pArray.forEach((pObj,i)=>{
            document.write(`querySelectorAll: TagName p[${i}] = ${pObj.textContent} <br>`)
        });
    </script>
</body>
</html>
